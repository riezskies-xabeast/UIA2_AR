<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/3.3.2/aframe/build/aframe-ar.js"></script>
    
    <style>
      #intro-screen {
        position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
        background: #111; z-index: 10000; display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        font-family: 'Courier New', Courier, monospace; color: white;
        transition: opacity 0.5s ease;
      }
      .start-btn {
        margin-top: 20px; padding: 15px 40px; font-size: 18px;
        font-family: 'Courier New', Courier, monospace; background: transparent;
        color: white; border: 2px solid white; border-radius: 30px; cursor: pointer;
      }
      .start-btn:active { background: white; color: black; }
      
      .ui-overlay {
        position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
        z-index: 9999; pointer-events: none; display: flex; flex-direction: column;
        align-items: center; justify-content: center;
      }
      .scan-frame {
        width: 60vw; max-width: 300px; aspect-ratio: 1 / 1;
        border: 4px dashed rgba(255, 255, 255, 0.8); border-radius: 20px;
        box-shadow: 0 0 0 4000px rgba(0, 0, 0, 0.4); transition: all 0.3s ease-in-out;
      }
      .scan-frame.active {
        border: 4px solid #4CAF50; transform: scale(1.05);
        box-shadow: 0 0 0 4000px rgba(0, 0, 0, 0.6);
      }
      .scan-text {
        margin-top: 30px; padding: 12px 24px; font-weight: bold;
        font-family: 'Courier New', Courier, monospace; color: white;
        background: rgba(0, 0, 0, 0.7); border-radius: 30px; font-size: 16px;
      }

      #audio-btn {
        display: none; 
        position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
        padding: 15px 30px; font-size: 18px; font-family: 'Courier New', Courier, monospace;
        font-weight: bold; background: white; color: black; border: none;
        border-radius: 30px; cursor: pointer; z-index: 10001; pointer-events: auto;
        box-shadow: 0 4px 10px rgba(0,0,0,0.5); transition: background 0.2s;
      }
      #audio-btn:active { background: #ccc; }
    </style>

    <script>
      let currentAudio = null; 

      function startExperience() {
        const intro = document.getElementById('intro-screen');
        intro.style.opacity = '0';
        setTimeout(() => { intro.style.display = 'none'; }, 500);
      }

      function toggleAudio() {
        const btn = document.getElementById('audio-btn');
        if (currentAudio) {
          if (currentAudio.paused) {
            currentAudio.play();
            btn.innerText = "⏸ Pause Poem";
          } else {
            currentAudio.pause();
            btn.innerText = "▶️ Play Poem";
          }
        }
      }

      AFRAME.registerComponent('poetry-handler', {
        schema: { audioId: {type: 'string'} },
        init: function () {
          const frame = document.getElementById('scan-frame');
          const text = document.getElementById('scan-text');
          const audioBtn = document.getElementById('audio-btn');
          const audioEl = document.getElementById(this.data.audioId);

          this.el.addEventListener('markerFound', () => {
            frame.classList.add('active');
            text.innerText = "Poem Found!";
            
            currentAudio = audioEl;
            audioBtn.style.display = 'block';
            audioBtn.innerText = "▶️ Play Poem";
          });

          this.el.addEventListener('markerLost', () => {
            frame.classList.remove('active');
            text.innerText = "Align a poetry marker in the frame";
            
            if (currentAudio) {
              currentAudio.pause();
              currentAudio.currentTime = 0; 
            }
            currentAudio = null;
            audioBtn.style.display = 'none';
          });
        }
      });
    </script>
  </head>

  <body style="margin: 0px; overflow: hidden;">

    <div id="intro-screen">
      <h2>AR Poetry Book</h2>
      <p>Turn up your volume</p>
      <button class="start-btn" onclick="startExperience()">Tap to Start</button>
    </div>

    <div class="ui-overlay">
      <div id="scan-frame" class="scan-frame"></div>
      <div id="scan-text" class="scan-text">Align a poetry marker in the frame</div>
    </div>

    <button id="audio-btn" onclick="toggleAudio()">▶️ Play Poem</button>
