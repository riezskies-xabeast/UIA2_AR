<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/3.3.2/aframe/build/aframe-ar.js"></script>
    
    <style>
      /* 1. The UI Overlay Container */
      .ui-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: 9999;
        /* This prevents the UI from blocking touches to the 3D scene */
        pointer-events: none; 
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }

      /* 2. The Viewfinder Frame */
      .scan-frame {
        width: 60vw;
        max-width: 300px;
        aspect-ratio: 1 / 1;
        border: 4px dashed rgba(255, 255, 255, 0.8);
        border-radius: 20px;
        box-shadow: 0 0 0 4000px rgba(0, 0, 0, 0.4); /* Darkens the area outside the frame */
        transition: all 0.3s ease-in-out;
      }

      /* 3. The Active State (When marker is found) */
      .scan-frame.active {
        border: 4px solid #4CAF50; /* Turns solid green */
        transform: scale(1.05); /* Pops out slightly */
        box-shadow: 0 0 0 4000px rgba(0, 0, 0, 0.6);
      }

      /* 4. The Instruction Text */
      .scan-text {
        margin-top: 30px;
        font-family: 'Courier New', Courier, monospace; /* Fits the poetry theme! */
        font-weight: bold;
        color: white;
        background: rgba(0, 0, 0, 0.7);
        padding: 12px 24px;
        border-radius: 30px;
        text-align: center;
        font-size: 16px;
        transition: all 0.3s ease;
      }
    </style>

    <script>
      // 5. The Logic to change the UI when a marker is seen
      AFRAME.registerComponent('ui-controller', {
        init: function () {
          const frame = document.getElementById('scan-frame');
          const text = document.getElementById('scan-text');

          this.el.addEventListener('markerFound', () => {
            frame.classList.add('active');
            text.innerText = "Poem Unlocked";
          });

          this.el.addEventListener('markerLost', () => {
            frame.classList.remove('active');
            text.innerText = "Align a poetry marker in the frame";
          });
        }
      });
    </script>
  </head>

  <body style="margin: 0px; overflow: hidden;">

    <div class="ui-overlay">
      <div id="scan-frame" class="scan-frame"></div>
      <div id="scan-text" class="scan-text">Align a poetry marker in the frame</div>
    </div>

    <a-scene 
      embedded 
      arjs="sourceType: webcam; debugUIEnabled: false;"
      vr-mode-ui="enabled: false"
      renderer="logarithmicDepthBuffer: true;">
      
      <a-assets>
        <img id="image-1" src="book1.png">
        </a-assets>

      <a-marker type="pattern" url="marker1.patt" ui-controller>
        <a-plane src="#image-1" position="0 0.1 0" rotation="-90 0 0" width="1" height="1.4"></a-plane>
      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>

  </body>
</html>
